      var flash = { jump: 0, attack: 0 };   /* ms timestamps for HUD blip */
      var active = false;

      var player = { x: 70, y: 0, vy: 0, grounded: true, face: 1, walk: 0, atk: 0, cd: 0 };
      var camera = 0;
      var obstacles = [], balls = [], nextX = 420, destroyed = 0;

      function spawn(x) {
        var destructible = Math.random() < 0.55;
        obstacles.push({ x: x, w: destructible ? 30 : 34, h: destructible ? 30 : 40,
                         destructible: destructible, alive: true });
      }
      spawn(nextX); nextX += 240; spawn(nextX); nextX += 260;

      function norm(e) {
        var k = e.key.toLowerCase();
        if (k === 'w' || k === 'a' || k === 's' || k === 'd' || k === ' ' || k === 'spacebar') return k === 'spacebar' ? ' ' : k;
        return null;
      }
      cv.addEventListener('keydown', function (e) {
        var k = norm(e); if (!k) return;
        e.preventDefault();
        if (!held[k]) { held[k] = true; edge[k] = true; }   /* auto-repeat: held already true, no new edge */
      });
      cv.addEventListener('keyup', function (e) {
        var k = norm(e); if (!k) return;
        e.preventDefault(); held[k] = false;
      });
      function activate() { active = true; focusEl.classList.add('hide'); cv.focus(); }
      focusEl.addEventListener('click', activate);
      cv.addEventListener('pointerdown', activate);
      cv.addEventListener('blur', function () { active = false; held = {}; focusEl.classList.remove('hide'); });

      function rectHit(ax, aw, bx, bw) { return ax < bx + bw && ax + aw > bx; }

      function update(dt, ts) {
        /* movement: GetKey, continuous */
        var dir = 0;
        if (held['a']) dir -= 1;
        if (held['d']) dir += 1;
        if (dir !== 0) { player.face = dir; counts.move++; }
        player.x += dir * MOVE * dt;

        camera = Math.max(camera, player.x - BOUND);
        if (player.x < camera + 6) player.x = camera + 6;   /* cannot leave the left edge */

        /* jump: GetKeyDown, edge */
        if (edge['w'] && player.grounded) { player.vy = JUMPV; player.grounded = false; counts.jump++; flash.jump = ts; }
        /* attack: GetKeyDown, edge */
        if (edge[' '] && player.cd <= 0) {
          balls.push({ x: player.x + 14, y: GROUND - 26 - player.y, r: 6 });
          player.cd = 0.32; player.atk = 0.22; counts.attack++; flash.attack = ts;
        }
        edge = {};   /* edges live one frame */

        /* gravity */
        player.vy -= GRAV * dt;
        player.y += player.vy * dt;
        if (player.y <= 0) { player.y = 0; player.vy = 0; player.grounded = true; }
        player.cd -= dt; player.atk -= dt;
        if (dir !== 0 && player.grounded) player.walk += dt * 9; else player.walk = 0;

        /* horizontal block: cannot walk through a standing obstacle */
        var pw = 22;
        obstacles.forEach(function (o) {
          if (!o.alive) return;
          if (rectHit(player.x - pw / 2, pw, o.x, o.w) && player.y < o.h - 2) {
            if (player.x < o.x) player.x = o.x - pw / 2;   /* approaching from the left */
          }
        });

        /* balls */
        balls.forEach(function (b) { b.x += BALLV * dt; });
        balls = balls.filter(function (b) {
          if (b.x > camera + Wd + 40) return false;
          var kill = true;
          for (var i = 0; i < obstacles.length; i++) {
            var o = obstacles[i];
            if (o.alive && rectHit(b.x - b.r, b.r * 2, o.x, o.w) && (GROUND - b.y) < o.h + 6) {
              if (o.destructible) { o.alive = false; destroyed++; }
              return false;   /* stone absorbs the ball too */
            }
          }
          return kill;
        });

        /* spawn ahead, cull behind */
        while (nextX < camera + Wd + 300) { spawn(nextX); nextX += 200 + Math.random() * 150; }
        obstacles = obstacles.filter(function (o) { return o.x + o.w > camera - 60; });
      }

      function stick(cx, feetY) {
        var hipY = feetY - 20, shY = feetY - 38, headY = feetY - 45;
        g.strokeStyle = '#ECE5D8'; g.lineWidth = 2.4; g.lineCap = 'round';
        g.fillStyle = '#241F18';
        g.beginPath(); g.arc(cx, headY, 6, 0, Math.PI * 2); g.fill(); g.stroke();
        g.beginPath(); g.moveTo(cx, headY + 6); g.lineTo(cx, hipY); g.stroke();
        /* legs */
        g.beginPath();
        if (!player.grounded) { g.moveTo(cx, hipY); g.lineTo(cx - 7, feetY - 7); g.moveTo(cx, hipY); g.lineTo(cx + 9, feetY - 9); }
        else {
          var sw = Math.sin(player.walk) * 9;
          g.moveTo(cx, hipY); g.lineTo(cx + sw, feetY);
          g.moveTo(cx, hipY); g.lineTo(cx - sw, feetY);
        }
        g.stroke();
        /* arms */
        g.beginPath();
        if (player.atk > 0) {
          g.moveTo(cx, shY + 3); g.lineTo(cx + player.face * 16, shY + 1);   /* thrust */
          g.moveTo(cx, shY + 3); g.lineTo(cx - player.face * 8, shY + 13);
        } else if (!player.grounded) {
          g.moveTo(cx, shY + 3); g.lineTo(cx - 9, shY - 6); g.moveTo(cx, shY + 3); g.lineTo(cx + 9, shY - 6);
        } else {
          var asw = Math.sin(player.walk) * 7;
          g.moveTo(cx, shY + 3); g.lineTo(cx - asw, shY + 15);
          g.moveTo(cx, shY + 3); g.lineTo(cx + asw, shY + 15);
        }
        g.stroke();
      }

      function draw() {
        g.fillStyle = '#0F0E0C'; g.fillRect(0, 0, Wd, Hd);
        /* parallax dots */
        g.fillStyle = '#1a1712';
        for (var i = 0; i < 40; i++) {
          var sx = ((i * 137 - camera * 0.3) % (Wd + 20) + Wd + 20) % (Wd + 20) - 10;
          g.fillRect(sx, 30 + (i * 53) % (GROUND - 60), 2, 2);
        }
        /* ground */
        g.strokeStyle = '#2E2A20'; g.lineWidth = 2;
        g.beginPath(); g.moveTo(0, GROUND); g.lineTo(Wd, GROUND); g.stroke();
        g.fillStyle = '#141210'; g.fillRect(0, GROUND, Wd, Hd - GROUND);
        /* boundary hint */
        g.strokeStyle = 'rgba(216,162,74,.14)'; g.lineWidth = 1;
        g.beginPath(); g.moveTo(BOUND, 0); g.lineTo(BOUND, GROUND); g.stroke();
        /* obstacles */
        obstacles.forEach(function (o) {
          if (!o.alive) return;
          var sx = o.x - camera, sy = GROUND - o.h;
          if (o.destructible) {
            g.fillStyle = '#D8A24A'; g.fillRect(sx, sy, o.w, o.h);
            g.strokeStyle = '#8a6a2f'; g.lineWidth = 1.5; g.strokeRect(sx + 0.5, sy + 0.5, o.w - 1, o.h - 1);
            g.beginPath(); g.moveTo(sx, sy); g.lineTo(sx + o.w, sy + o.h); g.moveTo(sx + o.w, sy); g.lineTo(sx, sy + o.h); g.stroke();
          } else {
            g.fillStyle = '#6b6660'; g.fillRect(sx, sy, o.w, o.h);
            g.strokeStyle = '#3a3630'; g.lineWidth = 1.5; g.strokeRect(sx + 0.5, sy + 0.5, o.w - 1, o.h - 1);
          }
        });
        /* balls */
        g.fillStyle = '#B11226';
        balls.forEach(function (b) { g.beginPath(); g.arc(b.x - camera, b.y, b.r, 0, Math.PI * 2); g.fill(); });
        /* player */
        stick(player.x - camera, GROUND - player.y);
        /* score */
        g.fillStyle = '#8A8072'; g.font = '11px monospace'; g.textAlign = 'left';
        g.fillText('destroyed: ' + destroyed, 10, 18);
      }

      function hud(ts) {
        var moving = !!(held['a'] || held['d']);
        fMove.classList.toggle('lit', moving && active);
        fJump.classList.toggle('lit', ts - flash.jump < 170);
        fAttack.classList.toggle('lit', ts - flash.attack < 170);
        cMove.textContent = counts.move;
        cJump.textContent = counts.jump;
        cAttack.textContent = counts.attack;
      }

      var last = null;
      function loop(ts) {
        if (!mount.isConnected) return;
        var dt = last === null ? 0 : Math.min((ts - last) / 1000, 0.05);
        last = ts;
        if (active) update(dt, ts);
        draw();
        hud(ts);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    },

    quiz: function (mount) {
      var Q = W.widgets.quiz;
      var best = lsGet('quizBest', null);
      function paint() {
        var qz = quizState;
        mount.innerHTML = '';
        var dlg = el('div', 'wg-dlg');
        if (qz.done) {
          var lineTxt = qz.score === Q.length ? 'Flawless. The anatomy is yours.'
            : qz.score >= Q.length - 2 ? 'Solid. Skim the articles for the ones you missed.'
            : 'Worth a re-read before Assignment 1 lands next week.';
          dlg.innerHTML = '<div class="wg-dlg-who">Quest Complete</div>'
            + '<div style="text-align:center; padding:16px 0 4px;">'
            + '<div class="wg-score-big">' + qz.score + ' / ' + Q.length + '</div>'
            + '<div class="wg-score-sub">' + esc(lineTxt)
            + (best !== null ? ' · personal best ' + best + '/' + Q.length : '') + '</div></div>'
            + '<div class="wg-dlg-foot"><span class="wg-dlg-num">run complete</span></div>';
          var retry = el('button', 'wg-btn', 'Run It Again');
          retry.addEventListener('click', function () {
            quizState = { idx: 0, picked: null, score: 0, done: false }; paint();
          });
          dlg.lastChild.appendChild(retry);
        } else {
          var item = Q[qz.idx];
          dlg.innerHTML = '<div class="wg-dlg-who">Question</div>'
            + '<p class="wg-dlg-q">' + esc(item.q) + '</p>';
          var wrap = el('div', 'wg-answers');
          item.options.forEach(function (opt, oi) {
            var cls = 'wg-ans';
            if (qz.picked !== null) {
              if (oi === item.correct) cls += ' right';
              else if (oi === qz.picked) cls += ' wrong';
            }
            var b = el('button', cls, esc(opt));
            b.disabled = qz.picked !== null;
            b.addEventListener('click', function () {
              if (qz.picked !== null) return;
              qz.picked = oi;
              if (oi === item.correct) qz.score++;
              paint();
            });
            wrap.appendChild(b);
          });
          dlg.appendChild(wrap);
          if (qz.picked !== null) dlg.appendChild(el('div', 'wg-explain', esc(item.explain)));
          var foot = el('div', 'wg-dlg-foot');
          foot.appendChild(el('span', 'wg-dlg-num', (qz.idx + 1) + ' / ' + Q.length + ' · score ' + qz.score));
          var next = el('button', 'wg-btn', qz.idx + 1 === Q.length ? 'Finish' : 'Next');
          next.disabled = qz.picked === null;
          next.addEventListener('click', function () {
            if (qz.idx + 1 === Q.length) {
              qz.done = true;
              if (best === null || qz.score > best) { best = qz.score; lsSet('quizBest', best); }
            } else { qz.idx++; qz.picked = null; }
            paint();
          });
          foot.appendChild(next);
          dlg.appendChild(foot);
        }
        mount.appendChild(dlg);
      }
      paint();
    },

    checklist: function (mount) {
      var C = W.widgets.checklist;
      var checks = lsGet('checks', {});
      function paint() {
        mount.innerHTML = '';
        var req = C.items.filter(function (c) { return !c.optional; });
        var done = req.filter(function (c) { return checks[c.id]; }).length;
        var head = el('div', '', '<span class="wg-label">The Finish Line · ' + done + '/' + req.length + ' required</span>');
        mount.appendChild(head);
        var track = el('div', 'wg-track');
        track.appendChild(el('div', 'wg-fill'));
        track.firstChild.style.width = Math.round(done / req.length * 100) + '%';
        mount.appendChild(track);
        var list = el('div', 'wg-panel');
        C.items.forEach(function (c) {
          var row = el('div', 'wg-check' + (checks[c.id] ? ' done' : ''));
          row.innerHTML = '<span class="wg-box">' + (checks[c.id] ? '✓' : '') + '</span>'
            + '<span class="ctext">' + esc(c.label)
            + (c.optional ? '<span class="wg-opt-tag">optional</span>' : '') + '</span>';
          row.addEventListener('click', function () {
            checks[c.id] = !checks[c.id]; lsSet('checks', checks); paint();
          });
          list.appendChild(row);
        });
        mount.appendChild(list);
        mount.appendChild(el('div', 'wg-note', esc(C.note)));
        if (done === req.length) {
          mount.appendChild(el('div', 'wg-done-line',
            '✓ All four boxes. You are officially not doing Week 1 late. See you at the Standard Prefab.'));
        }
      }
      paint();
    }
  };

  /* ================= sidebar ================= */
  function renderSide(current, filter) {
    var side = document.getElementById('wk-side');
    side.innerHTML = '';
    var total = 0;
    W.sections.forEach(function (sec) {
      var matches = sec.articles.filter(function (a) {
        return !filter || a.title.toLowerCase().indexOf(filter) >= 0;
      });
      if (!matches.length) return;
      side.appendChild(el('div', 'wk-sect', esc(sec.name)));
      matches.forEach(function (a) {
        total++;
        var link = el('a', 'wk-link'
          + (a.id === current ? ' on' : '')
          + (visited.indexOf(a.id) >= 0 ? ' seen' : ''));
        link.href = '#/' + a.id;
        link.innerHTML = esc(a.title) + '<span class="v">✓</span>';
        side.appendChild(link);
      });
    });
    if (!filter) {
      var prog = el('div', 'wk-progress');
      var pct = Math.round(visited.length / flat.length * 100);
      prog.innerHTML = 'read ' + visited.length + ' / ' + flat.length + ' articles'
        + '<div class="bar"><div class="fill" style="width:' + pct + '%;"></div></div>';
      side.appendChild(prog);
    } else if (!total) {
      side.appendChild(el('div', 'wk-progress', 'no articles match'));
    }
  }

  /* ================= article loading ================= */
  function loadArticle(id) {
    if (!titles[id]) id = W.home;
    var main = document.getElementById('wk-main');

    function show(md) {
      main.innerHTML = '';
      var art = el('article', 'wk-art');
      art.innerHTML = markdown(md);
      main.appendChild(art);

      /* mount widgets */
      var mounts = art.querySelectorAll('[data-widget]');
      for (var m = 0; m < mounts.length; m++) {
        var name = mounts[m].getAttribute('data-widget');
        if (widgets[name]) widgets[name](mounts[m]);
        else mounts[m].innerHTML = '<div class="wg-hint">unknown widget: ' + esc(name) + '</div>';
      }

      /* prev / next */
      var idx = -1;
      flat.forEach(function (a, k) { if (a.id === id) idx = k; });
      var nav = el('div', 'wk-footnav');
      if (idx > 0) {
        var prev = el('a', 'wk-fbtn', '← ' + esc(flat[idx - 1].title));
        prev.href = '#/' + flat[idx - 1].id;
        nav.appendChild(prev);
      }
      if (idx >= 0 && idx < flat.length - 1) {
        var nxt = el('a', 'wk-fbtn next', esc(flat[idx + 1].title) + ' →');
        nxt.href = '#/' + flat[idx + 1].id;
        nav.appendChild(nxt);
      }
      main.appendChild(nav);
      main.scrollTop = 0;

      if (visited.indexOf(id) < 0) { visited.push(id); lsSet('visited', visited); }
      lsSet('last', id);
      renderSide(id, currentFilter());
    }

    if (cache[id]) { show(cache[id]); return; }
    fetch(BASE + 'articles/' + id + '.md')
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (md) { cache[id] = md; show(md); })
      .catch(function () {
        main.innerHTML = '<div class="wk-error">Couldn\'t load “' + esc(id) + '”.<br>'
          + 'If you are the instructor: confirm <code>' + esc('w05/articles/' + id)
          + '.md</code> was uploaded beside this file.</div>';
        renderSide(id, currentFilter());
      });
  }

  function currentFilter() {
    var inp = document.getElementById('wk-search');
    return inp ? inp.value.trim().toLowerCase() : '';
  }
  function route() {
    var h = location.hash.replace(/^#\/?/, '');
    loadArticle(h || lsGet('last', W.home));
  }

  /* ================= init ================= */
  window.SE266_WIKI_INIT = function (data) {
    if (!data) {
      document.getElementById('wk-main').innerHTML =
        '<div class="wk-error">Could not load w05/wiki-data.js.<br>Confirm the w03 folder was uploaded beside this file.</div>';
      return;
    }
    W = data;
    NS = 'se266wiki:' + W.weekId + ':';
    visited = lsGet('visited', []);
    titles = {};
    flat = [];
    W.sections.forEach(function (sec) {
      sec.articles.forEach(function (a) { titles[a.id] = a.title; flat.push(a); });
    });
    document.getElementById('wk-kicker').textContent = W.courseTitle + ' · Course Wiki';
    document.getElementById('wk-title').textContent = W.weekTitle;
    document.getElementById('wk-search').addEventListener('input', function () {
      renderSide(location.hash.replace(/^#\/?/, '') || W.home, currentFilter());
    });
    window.addEventListener('hashchange', route);
    route();
    window.SE266_WIKI_READY = true;   /* deploy-verification global */
  };

  /* Fonts: attempt the design system's faces; if the CDN is blocked the
     stacks in :root degrade gracefully. Non-blocking. */
  try {
    var f = document.createElement('link');
    f.rel = 'stylesheet';
    f.href = 'https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Archivo:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap';
    document.head.appendChild(f);
  } catch (e) {}
})();

/* Data bootstrap: dynamic injection, because a static <script src>
   does not execute inside a D2L content topic. */
(function (done) {
  var s = document.createElement('script');
  s.src = (window.SE266_WIKI_BASE || '') + 'wiki-data.js';
  s.onload  = function () { done(window.SE266_WIKI || null); };
  s.onerror = function () { console.warn('wiki-data.js failed to load'); done(null); };
  document.head.appendChild(s);
})(window.SE266_WIKI_INIT);
</script>
</body>
