<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Week 01 · Engines, Anatomy, and Choosing Yours</title>
<style>
  /* ============================================================
   * SE 266 course wiki shell: Week 01
   * Styling follows the SCSU "Game Design Toolkit" design system.
   * Manifest + widget data load from wiki-data.js by dynamic
   * injection (static <script src> is inert in D2L topics);
   * articles are markdown files in articles/, loaded via fetch()
   * (same-origin with the LMS, verified working in the sandbox).
   * ============================================================ */
  * { box-sizing: border-box; }
  body { margin: 0; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

  :root {
    --bg: #131210;         --card: #1C1915;       --card-border: #2E2A20;
    --panel: #0F0E0C;      --panel-border: #2A261E;
    --chip: #241F18;       --chip-border: #3A342A;
    --red: #B11226;        --red-dark: #7E0C1A;   --red-wash: #2A1216;
    --gold: #D8A24A;       --cream: #FAF7F2;      --ink: #ECE5D8;
    --body: #C9C0B2;       --mut: #9D9284;        --dim: #8A8072;  --faint: #6E665A;
    --green: #6FBF73;      --pink: #F0B8C0;       --rose: #E7B9C0;
    --sans: 'Public Sans', -apple-system, 'Segoe UI', Roboto, sans-serif;
    --disp: 'Archivo', 'Arial Black', 'Avenir Next Condensed', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }

  input[type=range] { accent-color: var(--red); width: 100%; height: 4px; }

  /* FIXED PIXEL HEIGHT: the D2L iframe sizes to content; never 100vh.
     The sidebar and the article pane scroll independently inside it. */
  .wk-root { height: 880px; width: 100%; background: var(--bg); font-family: var(--sans);
             display: flex; flex-direction: column; overflow: hidden; border-radius: 14px; }

  /* ---- header bar (editor-window pattern, slim) ---- */
  .wk-head { flex: none; background: var(--card); border-bottom: 1px solid var(--card-border);
             padding: 12px 20px; display: flex; align-items: center; gap: 14px; }
  .wk-dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; flex: none; }
  .wk-title-zone { min-width: 0; }
  .wk-kicker { font-family: var(--mono); font-size: 10px; letter-spacing: .13em;
               text-transform: uppercase; color: var(--gold); white-space: nowrap; }
  .wk-title { font-family: var(--disp); font-weight: 900; font-size: 17px; letter-spacing: -.01em;
              text-transform: uppercase; color: var(--cream); white-space: nowrap; overflow: hidden;
              text-overflow: ellipsis; }
  .wk-search { margin-left: auto; flex: none; width: 220px; position: relative; }
  .wk-search input { width: 100%; background: var(--panel); border: 1px solid var(--chip-border);
                     border-radius: 20px; color: var(--ink); font-family: var(--mono); font-size: 12px;
                     padding: 7px 14px; outline: none; }
  .wk-search input:focus { border-color: var(--gold); }
  .wk-search input::placeholder { color: var(--faint); }
  .wk-ready { flex: none; display: flex; align-items: center; gap: 7px;
              font-family: var(--mono); font-size: 11px; color: var(--green); }

  /* ---- body: sidebar + article ---- */
  .wk-body { flex: 1; min-height: 0; display: flex; }

  .wk-side { flex: none; width: 248px; border-right: 1px solid var(--card-border);
             overflow-y: auto; padding: 16px 12px 24px; background: #161310; }
  .wk-sect { font-family: var(--mono); font-size: 10px; letter-spacing: .13em; text-transform: uppercase;
             color: var(--gold); margin: 16px 8px 7px; display: flex; align-items: center; gap: 8px; }
  .wk-sect:first-child { margin-top: 0; }
  .wk-sect::after { content: ""; flex: 1; height: 1px; background: var(--card-border); }
  .wk-link { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px;
             cursor: pointer; color: var(--body); font-size: 13px; line-height: 1.35;
             text-decoration: none; border: 1px solid transparent; }
  .wk-link:hover { background: #231F19; color: var(--ink); }
  .wk-link.on { background: var(--red-wash); border-color: var(--red); color: var(--cream); }
  .wk-link .v { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--green);
                visibility: hidden; flex: none; }
  .wk-link.seen .v { visibility: visible; }
  .wk-progress { margin: 18px 8px 0; font-family: var(--mono); font-size: 10px; color: var(--faint); }
  .wk-progress .bar { height: 5px; background: var(--chip); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .wk-progress .fill { height: 100%; background: linear-gradient(90deg, var(--red-dark), var(--red)); border-radius: 3px; }

  .wk-main { flex: 1; min-width: 0; overflow-y: auto; padding: 26px 34px 48px; }
  .wk-art { max-width: 720px; margin: 0 auto; }

  /* ---- article typography ---- */
  .wk-art h1 { font-family: var(--disp); font-weight: 900; font-size: 32px; line-height: 1.02;
               letter-spacing: -.02em; text-transform: uppercase; color: var(--cream); margin: 0 0 6px;
               padding-bottom: 14px; border-bottom: 1px solid var(--card-border); position: relative; }
  .wk-art h1::after { content: ""; position: absolute; left: 0; bottom: -1px; width: 64px; height: 2px;
                      background: var(--red); }
  .wk-art h2 { font-family: var(--disp); font-weight: 800; font-size: 19px; letter-spacing: -.01em;
               text-transform: uppercase; color: var(--cream); margin: 30px 0 10px;
               display: flex; align-items: center; gap: 10px; }
  .wk-art h2::before { content: ""; width: 0; height: 0; border-left: 7px solid transparent;
                       border-right: 7px solid transparent; border-bottom: 11px solid var(--red); flex: none; }
  .wk-art h3 { font-family: var(--disp); font-weight: 800; font-size: 15px; color: var(--gold);
               margin: 22px 0 8px; }
  .wk-art p { font-size: 15px; line-height: 1.7; color: var(--body); margin: 14px 0; }
  .wk-art strong { color: var(--cream); }
  .wk-art em { color: var(--ink); }
  .wk-art ul, .wk-art ol { margin: 14px 0; padding-left: 24px; }
  .wk-art li { font-size: 15px; line-height: 1.65; color: var(--body); margin: 7px 0; }
  .wk-art li::marker { color: var(--red); font-family: var(--mono); }
  .wk-art blockquote { margin: 16px 0; padding: 12px 16px; background: var(--panel);
                       border: 1px solid var(--panel-border); border-left: 3px solid var(--gold);
                       border-radius: 8px; }
  .wk-art blockquote p { margin: 4px 0; font-size: 13.5px; line-height: 1.6; color: var(--mut); }
  .wk-art code { font-family: var(--mono); font-size: .88em; color: var(--pink);
                 background: var(--chip); border: 1px solid var(--chip-border);
                 border-radius: 4px; padding: 1px 6px; }
  .wk-art pre { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px;
                padding: 16px 18px; overflow-x: auto; margin: 16px 0; }
  .wk-art pre code { background: none; border: none; padding: 0; color: var(--body);
                     font-size: 13px; line-height: 1.8; }
  .wk-art .tablewrap { overflow-x: auto; margin: 16px 0; border: 1px solid var(--panel-border); border-radius: 10px; }
  .wk-art table { border-collapse: collapse; width: 100%; min-width: 620px; background: var(--panel); font-size: 13px; }
  .wk-art th { font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
               color: var(--gold); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--card-border); }
  .wk-art td { padding: 9px 14px; color: var(--body); border-bottom: 1px solid var(--panel-border); line-height: 1.5; }
  .wk-art tr:last-child td { border-bottom: none; }
  .wk-art td:first-child { color: var(--cream); }
  .wk-art hr { border: none; height: 1px; background: var(--card-border); margin: 26px 0; }
  .wk-art a { color: var(--rose); text-decoration: none; border-bottom: 1px solid rgba(231,185,192,.35); }
  .wk-art a:hover { color: var(--cream); border-bottom-color: var(--cream); }
  .wk-art a.wl { color: var(--rose); }
  .wk-art a.wl-missing { color: var(--red); border-bottom: 1px dashed var(--red); cursor: help; }
  .wk-art a.wl-x { border-bottom-style: dashed; }
  .wk-art a.wl-x::after { content: " ⧉"; font-size: .75em; color: var(--gold); }
  .wk-art a.ext::after { content: " ↗"; font-size: .8em; color: var(--faint); }

  /* ---- article footer nav ---- */
  .wk-footnav { max-width: 720px; margin: 40px auto 0; padding-top: 16px;
                border-top: 1px solid var(--card-border); display: flex; gap: 10px; }
  .wk-fbtn { cursor: pointer; border: 1px solid var(--chip-border); background: var(--chip);
             color: var(--ink); font-family: var(--mono); font-size: 12px; padding: 9px 14px;
             border-radius: 7px; text-decoration: none; max-width: 48%; overflow: hidden;
             text-overflow: ellipsis; white-space: nowrap; }
  .wk-fbtn:hover { filter: brightness(1.12); }
  .wk-fbtn.next { margin-left: auto; }

  /* ---- widgets (shared pieces) ---- */
  .wg { margin: 20px 0; }
  .wg-panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; }
  .wg-label { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
              color: var(--gold); }
  .wg-btn { cursor: pointer; border: none; background: var(--red); color: var(--cream);
            font-family: var(--disp); font-weight: 800; font-size: 13px; text-transform: uppercase;
            letter-spacing: .04em; padding: 9px 18px; border-radius: 7px;
            display: inline-flex; align-items: center; gap: 8px; }
  .wg-btn:hover { filter: brightness(1.12); }
  .wg-btn:disabled { opacity: .4; cursor: default; filter: none; }

  /* anatomy nav grid */
  .wg-anatomy { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .wg-organ { cursor: pointer; background: var(--panel); border: 2px solid var(--panel-border);
              border-radius: 10px; padding: 12px; text-align: left; display: flex; align-items: center;
              gap: 10px; text-decoration: none; }
  .wg-organ:hover { background: #231F19; }
  .wg-organ .oname { font-family: var(--disp); font-weight: 800; font-size: 12.5px; color: var(--cream); line-height: 1.2; }
  .wg-organ .oweek { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 2px; }
  .wg-organ .tick { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--green);
                    visibility: hidden; flex: none; }
  .wg-organ.seen .tick { visibility: visible; }
  .wg-anatomy-note { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-top: 10px; }

  /* chooser */
  .wg-q { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px;
          padding: 16px 18px; margin-bottom: 12px; }
  .wg-qhead { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .wg-qnum { font-family: var(--mono); font-size: 11px; color: var(--red); font-weight: 700; flex: none; }
  .wg-qtext { font-family: var(--disp); font-weight: 800; font-size: 14px; color: var(--cream); }
  .wg-opts { display: flex; gap: 8px; flex-wrap: wrap; }
  .wg-opt { cursor: pointer; border: 1px solid var(--chip-border); background: var(--chip); color: var(--body);
            font-family: var(--mono); font-size: 11.5px; padding: 8px 13px; border-radius: 20px; }
  .wg-opt:hover { filter: brightness(1.15); }
  .wg-opt.on { background: var(--red-wash); border-color: var(--red); color: var(--cream); }
  .wg-verdict { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px;
                padding: 16px 18px; }
  .wg-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .wg-bar-name { font-family: var(--disp); font-weight: 800; font-size: 12.5px; color: var(--cream);
                 width: 76px; flex: none; }
  .wg-bar-track { flex: 1; height: 8px; background: var(--chip); border-radius: 5px; overflow: hidden; }
  .wg-bar-fill { height: 100%; display: block; border-radius: 5px;
                 background: linear-gradient(90deg, var(--red-dark), var(--red)); transition: width .4s ease; }
  .wg-bar-row.ru .wg-bar-fill { background: #3F382C; }
  .wg-bar-pts { font-family: var(--mono); font-size: 11px; color: var(--dim); width: 30px;
                text-align: right; flex: none; }
  .wg-winner { margin-top: 12px; border-top: 1px solid var(--panel-border); padding-top: 12px; }
  .wg-wname { font-family: var(--disp); font-weight: 900; font-size: 20px; text-transform: uppercase;
              color: var(--cream); text-decoration: none; border-bottom: 2px solid var(--red); }
  .wg-wname:hover { color: var(--rose); }
  .wg-wchip { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
              color: var(--gold); border: 1px solid var(--chip-border); background: var(--chip);
              border-radius: 20px; padding: 3px 10px; margin-left: 8px; vertical-align: 3px; }
  .wg-agree { margin-top: 8px; font-size: 12.5px; line-height: 1.6; color: var(--pink); }
  .wg-foot { margin-top: 8px; font-family: var(--mono); font-size: 11px; color: var(--gold); line-height: 1.6; }
  .wg-hint { font-family: var(--mono); font-size: 11.5px; color: var(--faint); padding: 4px 0; }

  /* quiz (dialogue-box pattern) */
  .wg-dlg { position: relative; padding: 20px 20px 18px; border: 2px solid var(--chip-border);
            border-radius: 12px; background: var(--panel); margin-top: 16px; }
  .wg-dlg-who { position: absolute; top: -13px; left: 18px; background: var(--red); color: var(--cream);
                font-family: var(--disp); font-weight: 800; font-size: 13px; padding: 5px 14px;
                border-radius: 6px; }
  .wg-dlg-q { font-size: 15px; line-height: 1.6; color: var(--ink); margin: 8px 0 14px; }
  .wg-answers { display: flex; flex-direction: column; gap: 8px; }
  .wg-ans { cursor: pointer; text-align: left; border: 1px solid var(--chip-border); background: var(--chip);
            color: var(--body); font-family: var(--sans); font-size: 13.5px; line-height: 1.45;
            padding: 10px 13px; border-radius: 9px; }
  .wg-ans:hover { filter: brightness(1.13); }
  .wg-ans.right { border-color: var(--green); color: var(--green); background: #14201a; }
  .wg-ans.wrong { border-color: var(--red); color: var(--pink); background: var(--red-wash); }
  .wg-ans:disabled { cursor: default; }
  .wg-ans:disabled:hover { filter: none; }
  .wg-explain { margin-top: 12px; border-left: 3px solid var(--gold); padding: 2px 0 2px 12px;
                font-size: 13px; line-height: 1.6; color: var(--mut); }
  .wg-dlg-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
  .wg-dlg-num { font-family: var(--mono); font-size: 12px; color: var(--faint); }
  .wg-score-big { font-family: var(--disp); font-weight: 900; font-size: 40px; color: var(--cream); line-height: 1; }
  .wg-score-sub { font-family: var(--mono); font-size: 12px; color: var(--dim); margin-top: 8px; }

  /* checklist */
  .wg-check { display: flex; align-items: flex-start; gap: 13px; padding: 12px 15px; cursor: pointer;
              border-bottom: 1px solid var(--panel-border); }
  .wg-check:last-child { border-bottom: none; }
  .wg-check:hover { background: #17140f; }
  .wg-box { flex: none; width: 20px; height: 20px; border: 2px solid var(--chip-border); border-radius: 5px;
            margin-top: 1px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 13px; color: var(--cream); }
  .wg-check.done .wg-box { background: var(--red); border-color: var(--red); }
  .wg-check .ctext { font-size: 14px; line-height: 1.5; color: var(--ink); }
  .wg-check.done .ctext { color: var(--faint); text-decoration: line-through; }
  .wg-opt-tag { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
                color: var(--gold); margin-left: 8px; }
  .wg-track { height: 8px; background: var(--chip); border-radius: 5px; overflow: hidden; margin: 10px 0 14px; }
  .wg-fill { height: 100%; background: linear-gradient(90deg, var(--red-dark), var(--red));
             border-radius: 5px; transition: width .35s ease; }
  .wg-note { font-size: 12px; line-height: 1.6; color: var(--dim); margin-top: 12px; }
  .wg-done-line { margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--green); }

  /* render pipeline (supplemental) */
  .wg-rp { position: relative; padding: 22px 0 6px; }
  .wg-rp-arrowwrap { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
  .wg-rp-line { position: absolute; left: 50%; transform: translateX(-50%); top: 0; bottom: 24px; width: 6px;
                border-radius: 3px; opacity: .75;
                background: repeating-linear-gradient(180deg, var(--red) 0 10px, transparent 10px 22px);
                animation: wg-rp-scroll 1.1s linear infinite; }
  @keyframes wg-rp-scroll { to { background-position: 0 22px; } }
  .wg-rp-head { position: absolute; left: 50%; transform: translateX(-50%); bottom: 0; width: 0; height: 0;
                border-left: 15px solid transparent; border-right: 15px solid transparent;
                border-top: 24px solid var(--red); opacity: .85; }
  .wg-rp-stage { position: relative; z-index: 1; display: block; width: min(340px, 80%); margin: 0 auto 16px;
                 cursor: pointer; background: var(--card); border: 1px solid var(--chip-border);
                 border-radius: 12px; padding: 13px 18px; text-align: center; }
  .wg-rp-stage:hover { border-color: var(--gold); background: #231F19; }
  .wg-rp-stage .rname { font-family: var(--disp); font-weight: 900; font-size: 18px; text-transform: uppercase;
                        letter-spacing: .02em; color: var(--cream); }
  .wg-rp-stage .rtag { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 3px; }
  .wg-rp-stage .rtick { position: absolute; top: 10px; right: 13px; font-family: var(--mono); font-size: 12px;
                        color: var(--green); visibility: hidden; }
  .wg-rp-stage.seen .rtick { visibility: visible; }
  .wg-rp-note { text-align: center; font-family: var(--mono); font-size: 11.5px; color: var(--faint);
                padding: 4px 0 8px; }
  .wg-modal-backdrop { position: fixed; inset: 0; background: rgba(10,9,7,.74); z-index: 90;
                       display: flex; align-items: center; justify-content: center; padding: 24px; }
  .wg-modal { font-family: var(--sans); width: min(560px, 94%); max-height: 84%; overflow-y: auto; background: var(--card);
              border: 1px solid var(--chip-border); border-top: 3px solid var(--red); border-radius: 14px;
              padding: 22px 26px 24px; box-shadow: 0 24px 70px rgba(0,0,0,.55); position: relative; }
  .wg-modal h3 { font-family: var(--disp); font-weight: 900; font-size: 24px; text-transform: uppercase;
                 color: var(--cream); margin: 0; }
  .wg-modal .mtag { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
                    color: var(--gold); margin-top: 4px; }
  .wg-modal p { font-size: 14.5px; line-height: 1.7; color: var(--body); margin: 14px 0 0; }
  .wg-modal a.wl { color: var(--rose); border-bottom: 1px solid rgba(231,185,192,.35); text-decoration: none; }
  .wg-modal a.wl:hover { color: var(--cream); }
  .wg-modal a.wl-x { border-bottom-style: dashed; }
  .wg-modal-x { position: absolute; top: 12px; right: 14px; cursor: pointer; border: none; background: none;
                color: var(--dim); font-family: var(--mono); font-size: 16px; }
  .wg-modal-x:hover { color: var(--cream); }

  .wk-error { padding: 48px 20px; text-align: center; font-family: var(--mono); font-size: 13px;
              color: var(--pink); line-height: 1.8; }

  @media (max-width: 720px) {
    .wk-side { display: none; }
    .wg-anatomy { grid-template-columns: 1fr; }
    .wk-search { width: 130px; }
    .wk-title { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="wk-root">
  <div class="wk-head">
    <div style="display:flex; gap:6px; flex:none;">
      <span class="wk-dot" style="background:#B11226;"></span>
      <span class="wk-dot" style="background:#D8A24A;"></span>
      <span class="wk-dot" style="background:#4d4a42;"></span>
    </div>
    <div class="wk-title-zone">
      <div class="wk-kicker" id="wk-kicker">SE 266 · Course Wiki</div>
      <div class="wk-title" id="wk-title">Loading…</div>
    </div>
    <div class="wk-search"><input id="wk-search" type="text" placeholder="search articles…" autocomplete="off"></div>
    <div class="wk-ready"><span style="width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid #6FBF73;"></span>wiki</div>
  </div>
  <div class="wk-body">
    <nav class="wk-side" id="wk-side"></nav>
    <main class="wk-main" id="wk-main">
      <div class="wk-error">Loading…</div>
    </main>
  </div>
</div>

<script>
(function () {
  'use strict';

  var BASE = 'w01/';       /* this week's content folder (data + articles live under it) */
  window.SE266_WIKI_BASE = BASE;

  var W = null;            /* wiki-data.js payload */
  var NS = '';             /* localStorage namespace, set after data loads */
  var cache = {};          /* fetched article markdown by id */
  var flat = [];           /* flattened article order for prev/next */
  var titles = {};         /* id -> title */
  var visited = [];
  var quizState = { idx: 0, picked: null, score: 0, done: false };

  function lsGet(key, fallback) {
    try { var v = localStorage.getItem(NS + key); return v === null ? fallback : JSON.parse(v); }
    catch (e) { return fallback; }
  }
  function lsSet(key, val) {
    try { localStorage.setItem(NS + key, JSON.stringify(val)); } catch (e) {}
  }
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html !== undefined) n.innerHTML = html;
    return n;
  }
  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ================= markdown ================= */
  function inline(s) {
    s = esc(s);
    /* code spans first so nothing inside them gets styled */
    s = s.replace(/`([^`]+)`/g, function (_, c) { return '<code>' + c + '</code>'; });
    /* wiki links [[id|label]] / [[id]] */
    s = s.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, function (_, id, label) { return wikiLink(id.trim(), label); });
    s = s.replace(/\[\[([^\]]+)\]\]/g, function (_, id) { return wikiLink(id.trim(), titles[id.trim()] || id.trim()); });
    /* external links */
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a class="ext" href="$2" target="_blank" rel="noopener">$1</a>');
    /* bold, then italic */
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }
  function wikiLink(id, label) {
    /* cross-wiki links: [[peer:article|label]] resolves through W.peers to a
       sibling shell at the content root, carrying the article as a #hash */
    var m = id.match(/^([a-z0-9]+):(.+)$/);
    if (m) {
      if (W.peers && W.peers[m[1]]) {
        return '<a class="wl wl-x" href="' + encodeURI(W.peers[m[1]]) + '#/' + m[2] + '">' + label + '</a>';
      }
      return '<a class="wl-missing" title="No wiki named “' + m[1] + '” in peers">' + label + '</a>';
    }
    if (titles[id]) return '<a class="wl" href="#/' + id + '">' + label + '</a>';
    return '<a class="wl-missing" title="No article named “' + id + '” yet">' + label + '</a>';
  }
  function markdown(md) {
    var lines = md.split(/\r?\n/), out = [], i = 0;
    while (i < lines.length) {
      var L = lines[i];

      if (/^```/.test(L)) {                       /* fenced code */
        var code = []; i++;
        while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
        i++;
        out.push('<pre><code>' + esc(code.join('\n')) + '</code></pre>');
        continue;
      }
      if (/^\{\{widget:([a-z-]+)\}\}\s*$/.test(L)) {   /* widget mount point */
        var wname = L.match(/^\{\{widget:([a-z-]+)\}\}/)[1];
        out.push('<div class="wg" data-widget="' + wname + '"></div>');
        i++; continue;
      }
      if (/^###\s+/.test(L)) { out.push('<h3>' + inline(L.replace(/^###\s+/, '')) + '</h3>'); i++; continue; }
      if (/^##\s+/.test(L))  { out.push('<h2>' + inline(L.replace(/^##\s+/, ''))  + '</h2>'); i++; continue; }
      if (/^#\s+/.test(L))   { out.push('<h1>' + inline(L.replace(/^#\s+/, ''))   + '</h1>'); i++; continue; }
      if (/^---+\s*$/.test(L)) { out.push('<hr>'); i++; continue; }

      if (/^\|/.test(L)) {                        /* table */
        var trows = [];
        while (i < lines.length && /^\|/.test(lines[i])) { trows.push(lines[i]); i++; }
        var parsed = trows.map(function (r) {
          return r.replace(/^\||\|$/g, '').split('|').map(function (c) { return c.trim(); });
        }).filter(function (r) {
          return !r.every(function (c) { return /^:?-+:?$/.test(c) || c === ''; });
        });
        var thead = parsed.shift() || [];
        out.push('<div class="tablewrap"><table><thead><tr>'
          + thead.map(function (c) { return '<th>' + inline(c) + '</th>'; }).join('')
          + '</tr></thead><tbody>'
          + parsed.map(function (r) {
              return '<tr>' + r.map(function (c) { return '<td>' + inline(c) + '</td>'; }).join('') + '</tr>';
            }).join('')
          + '</tbody></table></div>');
        continue;
      }
      if (/^>\s?/.test(L)) {                      /* blockquote */
        var q = [];
        while (i < lines.length && /^>\s?/.test(lines[i])) { q.push(lines[i].replace(/^>\s?/, '')); i++; }
        out.push('<blockquote>' + q.filter(function (x) { return x.trim(); })
          .map(function (x) { return '<p>' + inline(x) + '</p>'; }).join('') + '</blockquote>');
        continue;
      }
      if (/^[-*]\s+/.test(L)) {                   /* unordered list */
        var ul = [];
        while (i < lines.length && /^[-*]\s+/.test(lines[i])) { ul.push(lines[i].replace(/^[-*]\s+/, '')); i++; }
        out.push('<ul>' + ul.map(function (x) { return '<li>' + inline(x) + '</li>'; }).join('') + '</ul>');
        continue;
      }
      if (/^\d+\.\s+/.test(L)) {                  /* ordered list */
        var ol = [];
        while (i < lines.length && /^\d+\.\s+/.test(lines[i])) { ol.push(lines[i].replace(/^\d+\.\s+/, '')); i++; }
        out.push('<ol>' + ol.map(function (x) { return '<li>' + inline(x) + '</li>'; }).join('') + '</ol>');
        continue;
      }
      if (!L.trim()) { i++; continue; }

      var p = [];                                 /* paragraph */
      while (i < lines.length && lines[i].trim()
             && !/^(#{1,3}\s|>|[-*]\s|\d+\.\s|```|---|\{\{|\|)/.test(lines[i])) { p.push(lines[i]); i++; }
      out.push('<p>' + inline(p.join(' ')) + '</p>');
    }
    return out.join('\n');
  }

  /* ================= widgets ================= */
  var widgets = {

    anatomy: function (mount) {
      var grid = el('div', 'wg-anatomy');
      var seen = 0;
      W.widgets.anatomy.forEach(function (o) {
        var isSeen = visited.indexOf(o.id) >= 0;
        if (isSeen) seen++;
        var a = el('a', 'wg-organ' + (isSeen ? ' seen' : ''));
        a.href = '#/' + o.id;
        a.innerHTML = '<span style="flex:none;">' + o.icon + '</span>'
          + '<span><span class="oname">' + esc(o.name) + '</span>'
          + '<div class="oweek">' + esc(o.week) + '</div></span>'
          + '<span class="tick">✓</span>';
        grid.appendChild(a);
      });
      mount.appendChild(grid);
      mount.appendChild(el('div', 'wg-anatomy-note',
        'Each organ is its own article: explored ' + seen + '/' + W.widgets.anatomy.length + '.'));
    },

    chooser: function (mount) {
      var C = W.widgets.chooser;
      var answers = lsGet('chooser', {});
      function paint() {
        mount.innerHTML = '';
        C.questions.forEach(function (q, qi) {
          var card = el('div', 'wg-q');
          var head = el('div', 'wg-qhead');
          head.appendChild(el('span', 'wg-qnum', '0' + (qi + 1)));
          head.appendChild(el('span', 'wg-qtext', esc(q.q)));
          card.appendChild(head);
          var opts = el('div', 'wg-opts');
          q.options.forEach(function (opt, oi) {
            var b = el('button', 'wg-opt' + (answers[q.id] === oi ? ' on' : ''), esc(opt.label));
            b.addEventListener('click', function () {
              answers[q.id] = oi; lsSet('chooser', answers); paint();
            });
            opts.appendChild(b);
          });
          card.appendChild(opts);
          mount.appendChild(card);
        });

        var v = el('div', 'wg-verdict');
        var answered = Object.keys(answers).length;
        if (answered < C.questions.length) {
          v.innerHTML = '<div class="wg-label">Where they point</div>'
            + '<div class="wg-hint">Answer all four: ' + (C.questions.length - answered)
            + ' to go. Deciding is the assignment.</div>';
        } else {
          var totals = { unity: 0, godot: 0, unreal: 0, three: 0 }, foots = [];
          C.questions.forEach(function (q) {
            var opt = q.options[answers[q.id]];
            Object.keys(totals).forEach(function (k) { totals[k] += (opt.scores[k] || 0); });
            if (opt.foot) foots.push(opt.foot);
          });
          var ranked = Object.keys(totals).map(function (k) { return { id: k, pts: totals[k] }; })
            .sort(function (a, b) { return b.pts - a.pts; });
          var tie = ranked[1].pts === ranked[0].pts;
          if (tie && (ranked[0].id === 'unity' || ranked[1].id === 'unity')) {
            ranked.sort(function (a, b) { return (b.pts - a.pts) || (a.id === 'unity' ? -1 : b.id === 'unity' ? 1 : 0); });
          }
          var max = Math.max(ranked[0].pts, 1);
          var win = C.engines[ranked[0].id];
          v.innerHTML = '<div class="wg-label">Where they point</div><div style="margin-top:10px;"></div>';
          ranked.forEach(function (r, ri) {
            var wpc = Math.round(Math.max(r.pts, 0) / max * 100);
            v.appendChild(el('div', 'wg-bar-row' + (ri ? ' ru' : ''),
              '<span class="wg-bar-name">' + esc(C.engines[r.id].name) + '</span>'
              + '<span class="wg-bar-track"><span class="wg-bar-fill" style="width:' + wpc + '%;"></span></span>'
              + '<span class="wg-bar-pts">' + r.pts + '</span>'));
          });
          var wd = el('div', 'wg-winner');
          wd.innerHTML = '<a class="wg-wname" href="#/' + esc(win.article) + '">' + esc(win.name) + '</a>'
            + '<span class="wg-wchip">' + esc(win.lang) + '</span>'
            + '<span class="wg-wchip">' + esc(win.chip) + '</span>'
            + '<div class="wg-agree">What you\'re agreeing to: ' + esc(win.agree)
            + ' <a class="wl" href="#/' + esc(win.article) + '">Read the full profile →</a></div>'
            + (tie ? '<div class="wg-foot">Dead heat at the top. ' + esc(C.tiebreak) + '</div>' : '')
            + foots.map(function (f) { return '<div class="wg-foot">' + esc(f) + '</div>'; }).join('');
          v.appendChild(wd);
        }
        mount.appendChild(v);
      }
      paint();
    },

    /* the render pipeline: stages stacked over an animated flow arrow;
       selecting a stage opens a modal with the full explanation */
    renderpipeline: function (mount) {
      var RP = W.widgets.renderpipeline;
      var seen = {};
      function escClose(e) { if (e.key === 'Escape') closeModal(); }
      function closeModal() {
        var m = document.querySelector('.wg-modal-backdrop');
        if (m) m.remove();
        document.removeEventListener('keydown', escClose);
      }
      function openModal(s) {
        closeModal();
        var back = el('div', 'wg-modal-backdrop');
        var box = el('div', 'wg-modal');
        box.innerHTML = '<button class="wg-modal-x" aria-label="Close">✕</button>'
          + '<h3>' + esc(s.name) + '</h3>'
          + '<div class="mtag">' + esc(s.tag) + '</div>'
          + s.body.split(/\n\n+/).map(function (para) { return '<p>' + inline(para) + '</p>'; }).join('');
        back.appendChild(box);
        back.addEventListener('click', function (e) { if (e.target === back) closeModal(); });
        box.querySelector('.wg-modal-x').addEventListener('click', closeModal);
        document.addEventListener('keydown', escClose);
        document.body.appendChild(back);
      }
      function paint() {
        mount.innerHTML = '';
        var panel = el('div', 'wg-panel');
        panel.style.padding = '16px 18px 8px';
        panel.appendChild(el('div', 'wg-label', 'The Render Pipeline · one frame, top to bottom'));
        var pipe = el('div', 'wg-rp');
        pipe.innerHTML = '<div class="wg-rp-arrowwrap"><div class="wg-rp-line"></div><div class="wg-rp-head"></div></div>';
        RP.stages.forEach(function (s) {
          var b = el('button', 'wg-rp-stage' + (seen[s.id] ? ' seen' : ''));
          b.innerHTML = '<span class="rtick">✓</span><span class="rname">' + esc(s.name) + '</span>'
            + '<div class="rtag">' + esc(s.tag) + '</div>';
          b.addEventListener('click', function () { seen[s.id] = true; paint(); openModal(s); });
          pipe.appendChild(b);
        });
        panel.appendChild(pipe);
        panel.appendChild(el('div', 'wg-rp-note', esc(RP.instruction)));
        mount.appendChild(panel);
      }
      paint();
    },

    quiz: function (mount) {
      var Q = W.widgets.quiz;
      var best = lsGet('quizBest', null);
      function paint() {
        var qz = quizState;
        mount.innerHTML = '';
        var dlg = el('div', 'wg-dlg');
        if (qz.done) {
          var lineTxt = qz.score === Q.length ? 'Flawless. The anatomy is yours.'
            : qz.score >= Q.length - 2 ? 'Solid. Skim the articles for the ones you missed.'
            : 'Worth a re-read before A1 lands next week.';
          dlg.innerHTML = '<div class="wg-dlg-who">Quest Complete</div>'
            + '<div style="text-align:center; padding:16px 0 4px;">'
            + '<div class="wg-score-big">' + qz.score + ' / ' + Q.length + '</div>'
            + '<div class="wg-score-sub">' + esc(lineTxt)
            + (best !== null ? ' · personal best ' + best + '/' + Q.length : '') + '</div></div>'
            + '<div class="wg-dlg-foot"><span class="wg-dlg-num">run complete</span></div>';
          var retry = el('button', 'wg-btn', 'Run It Again');
          retry.addEventListener('click', function () {
            quizState = { idx: 0, picked: null, score: 0, done: false }; paint();
          });
          dlg.lastChild.appendChild(retry);
        } else {
          var item = Q[qz.idx];
          dlg.innerHTML = '<div class="wg-dlg-who">Question</div>'
            + '<p class="wg-dlg-q">' + esc(item.q) + '</p>';
          var wrap = el('div', 'wg-answers');
          item.options.forEach(function (opt, oi) {
            var cls = 'wg-ans';
            if (qz.picked !== null) {
              if (oi === item.correct) cls += ' right';
              else if (oi === qz.picked) cls += ' wrong';
            }
            var b = el('button', cls, esc(opt));
            b.disabled = qz.picked !== null;
            b.addEventListener('click', function () {
              if (qz.picked !== null) return;
              qz.picked = oi;
              if (oi === item.correct) qz.score++;
              paint();
            });
            wrap.appendChild(b);
          });
          dlg.appendChild(wrap);
          if (qz.picked !== null) dlg.appendChild(el('div', 'wg-explain', esc(item.explain)));
          var foot = el('div', 'wg-dlg-foot');
          foot.appendChild(el('span', 'wg-dlg-num', (qz.idx + 1) + ' / ' + Q.length + ' · score ' + qz.score));
          var next = el('button', 'wg-btn', qz.idx + 1 === Q.length ? 'Finish' : 'Next');
          next.disabled = qz.picked === null;
          next.addEventListener('click', function () {
            if (qz.idx + 1 === Q.length) {
              qz.done = true;
              if (best === null || qz.score > best) { best = qz.score; lsSet('quizBest', best); }
            } else { qz.idx++; qz.picked = null; }
            paint();
          });
          foot.appendChild(next);
          dlg.appendChild(foot);
        }
        mount.appendChild(dlg);
      }
      paint();
    },

    checklist: function (mount) {
      var C = W.widgets.checklist;
      var checks = lsGet('checks', {});
      function paint() {
        mount.innerHTML = '';
        var req = C.items.filter(function (c) { return !c.optional; });
        var done = req.filter(function (c) { return checks[c.id]; }).length;
        var head = el('div', '', '<span class="wg-label">The Finish Line · ' + done + '/' + req.length + ' required</span>');
        mount.appendChild(head);
        var track = el('div', 'wg-track');
        track.appendChild(el('div', 'wg-fill'));
        track.firstChild.style.width = Math.round(done / req.length * 100) + '%';
        mount.appendChild(track);
        var list = el('div', 'wg-panel');
        C.items.forEach(function (c) {
          var row = el('div', 'wg-check' + (checks[c.id] ? ' done' : ''));
          row.innerHTML = '<span class="wg-box">' + (checks[c.id] ? '✓' : '') + '</span>'
            + '<span class="ctext">' + esc(c.label)
            + (c.optional ? '<span class="wg-opt-tag">optional</span>' : '') + '</span>';
          row.addEventListener('click', function () {
            checks[c.id] = !checks[c.id]; lsSet('checks', checks); paint();
          });
          list.appendChild(row);
        });
        mount.appendChild(list);
        mount.appendChild(el('div', 'wg-note', esc(C.note)));
        if (done === req.length) {
          mount.appendChild(el('div', 'wg-done-line',
            '✓ All four boxes. You are officially not doing Week 1 late. See you at the Standard Prefab.'));
        }
      }
      paint();
    }
  };

  /* ================= sidebar ================= */
  function renderSide(current, filter) {
    var side = document.getElementById('wk-side');
    side.innerHTML = '';
    var total = 0;
    W.sections.forEach(function (sec) {
      var matches = sec.articles.filter(function (a) {
        return !filter || a.title.toLowerCase().indexOf(filter) >= 0;
      });
      if (!matches.length) return;
      side.appendChild(el('div', 'wk-sect', esc(sec.name)));
      matches.forEach(function (a) {
        total++;
        var link = el('a', 'wk-link'
          + (a.id === current ? ' on' : '')
          + (visited.indexOf(a.id) >= 0 ? ' seen' : ''));
        link.href = '#/' + a.id;
        link.innerHTML = esc(a.title) + '<span class="v">✓</span>';
        side.appendChild(link);
      });
    });
    if (!filter) {
      var prog = el('div', 'wk-progress');
      var pct = Math.round(visited.length / flat.length * 100);
      prog.innerHTML = 'read ' + visited.length + ' / ' + flat.length + ' articles'
        + '<div class="bar"><div class="fill" style="width:' + pct + '%;"></div></div>';
      side.appendChild(prog);
    } else if (!total) {
      side.appendChild(el('div', 'wk-progress', 'no articles match'));
    }
  }

  /* ================= article loading ================= */
  function loadArticle(id) {
    if (!titles[id]) id = W.home;
    var main = document.getElementById('wk-main');

    function show(md) {
      main.innerHTML = '';
      var art = el('article', 'wk-art');
      art.innerHTML = markdown(md);
      main.appendChild(art);

      /* mount widgets */
      var mounts = art.querySelectorAll('[data-widget]');
      for (var m = 0; m < mounts.length; m++) {
        var name = mounts[m].getAttribute('data-widget');
        if (widgets[name]) widgets[name](mounts[m]);
        else mounts[m].innerHTML = '<div class="wg-hint">unknown widget: ' + esc(name) + '</div>';
      }

      /* prev / next */
      var idx = -1;
      flat.forEach(function (a, k) { if (a.id === id) idx = k; });
      var nav = el('div', 'wk-footnav');
      if (idx > 0) {
        var prev = el('a', 'wk-fbtn', '← ' + esc(flat[idx - 1].title));
        prev.href = '#/' + flat[idx - 1].id;
        nav.appendChild(prev);
      }
      if (idx >= 0 && idx < flat.length - 1) {
        var nxt = el('a', 'wk-fbtn next', esc(flat[idx + 1].title) + ' →');
        nxt.href = '#/' + flat[idx + 1].id;
        nav.appendChild(nxt);
      }
      main.appendChild(nav);
      main.scrollTop = 0;

      if (visited.indexOf(id) < 0) { visited.push(id); lsSet('visited', visited); }
      lsSet('last', id);
      renderSide(id, currentFilter());
    }

    if (cache[id]) { show(cache[id]); return; }
    fetch(BASE + 'articles/' + id + '.md')
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (md) { cache[id] = md; show(md); })
      .catch(function () {
        main.innerHTML = '<div class="wk-error">Couldn\'t load “' + esc(id) + '”.<br>'
          + 'If you are the instructor: confirm <code>' + esc('w01/articles/' + id)
          + '.md</code> was uploaded beside this file.</div>';
        renderSide(id, currentFilter());
      });
  }

  function currentFilter() {
    var inp = document.getElementById('wk-search');
    return inp ? inp.value.trim().toLowerCase() : '';
  }
  function route() {
    var h = location.hash.replace(/^#\/?/, '');
    loadArticle(h || lsGet('last', W.home));
  }

  /* ================= init ================= */
  window.SE266_WIKI_INIT = function (data) {
    if (!data) {
      document.getElementById('wk-main').innerHTML =
        '<div class="wk-error">Could not load w01/wiki-data.js.<br>Confirm the w01 folder was uploaded beside this file.</div>';
      return;
    }
    W = data;
    NS = 'se266wiki:' + W.weekId + ':';
    visited = lsGet('visited', []);
    titles = {};
    flat = [];
    W.sections.forEach(function (sec) {
      sec.articles.forEach(function (a) { titles[a.id] = a.title; flat.push(a); });
    });
    document.getElementById('wk-kicker').textContent = W.courseTitle + ' · Course Wiki';
    document.getElementById('wk-title').textContent = W.weekTitle;
    document.getElementById('wk-search').addEventListener('input', function () {
      renderSide(location.hash.replace(/^#\/?/, '') || W.home, currentFilter());
    });
    window.addEventListener('hashchange', route);
    route();
    window.SE266_WIKI_READY = true;   /* deploy-verification global */
  };

  /* Fonts: attempt the design system's faces; if the CDN is blocked the
     stacks in :root degrade gracefully. Non-blocking. */
  try {
    var f = document.createElement('link');
    f.rel = 'stylesheet';
    f.href = 'https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Archivo:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap';
    document.head.appendChild(f);
  } catch (e) {}
})();

/* Data bootstrap: dynamic injection, because a static <script src>
   does not execute inside a D2L content topic. */
(function (done) {
  var s = document.createElement('script');
  s.src = (window.SE266_WIKI_BASE || '') + 'wiki-data.js';
  s.onload  = function () { done(window.SE266_WIKI || null); };
  s.onerror = function () { console.warn('wiki-data.js failed to load'); done(null); };
  document.head.appendChild(s);
})(window.SE266_WIKI_INIT);
</script>
